name: Savant
options:
  bundleIdPrefix: app
  deploymentTarget:
    iOS: "26.0"
    macOS: "15.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  RichEditorSwiftUI:
    url: https://github.com/canopas/rich-editor-swiftui.git
    from: 1.1.1
targets:
  Savant:
    type: application
    platform: iOS
    sources:
      - path: Savant
        excludes:
          - Resources/Info.plist
          - Resources/Assets.xcassets
          - Savant.entitlements
          - SavantMac.entitlements
          - Views/Mac
    resources:
      - path: Savant/Resources
    entitlements:
      path: Savant/Savant.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.app.savant
        com.apple.developer.icloud-services:
          - CloudKit
        aps-environment: development
    dependencies:
      - package: RichEditorSwiftUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.savant
        INFOPLIST_FILE: Savant/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: X26JY6WC4V
        DEVELOPMENT_ASSET_PATHS: ""
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      testTargets:
        - SavantTests
        - SavantUITests
    info:
      path: Savant/Resources/Info.plist
      properties:
        CFBundleDisplayName: Savant
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSSpeechRecognitionUsageDescription: Savant uses speech recognition to turn dictated thoughts into editable notes.
        NSMicrophoneUsageDescription: Savant uses the microphone for quick voice capture.
        NSPhotoLibraryUsageDescription: Savant can attach images to notes when you choose them.
        UIBackgroundModes:
          - fetch
          - processing
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - app.savant.tidy
  SavantMac:
    type: application
    platform: macOS
    sources:
      - path: Savant/App
      - path: Savant/Models
      - path: Savant/AI
      - path: Savant/Services/PersistenceController.swift
      - path: Savant/Services/FolderService.swift
      - path: Savant/Extensions/Color+Scheme.swift
      - path: Savant/Extensions/View+HoverTracking.swift
      - path: Savant/Views/Shared/SavantTheme.swift
      - path: Savant/Views/Shared/GrainOverlay.swift
      - path: Savant/Views/Mac
    scheme:
      testTargets: []
    resources:
      - path: Savant/Resources/Assets.xcassets
    entitlements:
      path: Savant/SavantMac.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.app.savant
        com.apple.developer.icloud-services:
          - CloudKit
        aps-environment: development
        com.apple.security.network.client: true
    dependencies:
      - package: RichEditorSwiftUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.savant.mac
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: X26JY6WC4V
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        INFOPLIST_KEY_CFBundleDisplayName: Savant
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
  SavantTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SavantTests
    dependencies:
      - target: Savant
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.savant.tests
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: X26JY6WC4V
  SavantUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SavantUITests
    dependencies:
      - target: Savant
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.savant.uitests
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: X26JY6WC4V
